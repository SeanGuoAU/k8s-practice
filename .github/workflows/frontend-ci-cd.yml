name: Frontend CI/CD

on:
  workflow_dispatch:
    inputs:
      run_cd:
        description: "Run CD and deploy after CI"
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: k8s
  IMAGE_NAME: frontend
  AWS_ROLE_TO_ASSUME: arn:aws:iam::715227881960:role/github-actions-k8s-deploy-uat

jobs:
  ci:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

  build-and-scan:
    name: Build & Scan Image
    runs-on: ubuntu-latest
    needs: ci
    if: ${{ inputs.run_cd }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: frontend
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $IMAGE_NAME:$IMAGE_TAG \
            -t $IMAGE_NAME:latest \
            .

      - name: Trivy image scan (HIGH,CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Docker Scout CVE scan (HIGH,CRITICAL)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          only-severities: critical,high
          exit-code: true

      - name: Push image to ECR
        run: echo "Image build and scans completed. Waiting for manual approval before push."

  approve-before-push:
    name: Approve before Docker push
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: ${{ inputs.run_cd }}
    environment:
      name: frontend-cd-approval

    steps:
      - name: Await manual approval
        run: echo "Waiting for required reviewer approval before pushing to ECR."

  push-and-deploy:
    name: Push Image & Deploy
    runs-on: ubuntu-latest
    needs: approve-before-push
    if: ${{ inputs.run_cd }}
    environment:
      name: frontend-cd-approval

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS role secret
        run: |
          if [ -z "${{ env.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "::error::AWS_ROLE_TO_ASSUME is empty."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-frontend-cd
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        working-directory: frontend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $IMAGE_NAME:$IMAGE_TAG \
            -t $IMAGE_NAME:latest \
            -t $REGISTRY/$ECR_REPOSITORY/$IMAGE_NAME:$IMAGE_TAG \
            -t $REGISTRY/$ECR_REPOSITORY/$IMAGE_NAME:latest \
            .

      - name: Push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/$ECR_REPOSITORY/$IMAGE_NAME:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY/$IMAGE_NAME:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name k8s

      - name: Roll out new image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl set image deployment/frontend \
            frontend=$REGISTRY/$ECR_REPOSITORY/$IMAGE_NAME:$IMAGE_TAG \
            --namespace default
          kubectl rollout status deployment/frontend \
            --namespace default \
            --timeout=120s
