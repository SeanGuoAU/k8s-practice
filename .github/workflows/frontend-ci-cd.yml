name: Frontend CI & Push

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: k8s-uat
  EKS_CLUSTER_NAME: k8s-uat
  IMAGE_NAME: frontend
  AWS_ROLE_TO_ASSUME: arn:aws:iam::715227881960:role/github-actions-k8s-deploy-uat

jobs:
  ci:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

  build-and-scan:
    name: Build & Scan Image
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: frontend
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $IMAGE_NAME:$IMAGE_TAG \
            -t $IMAGE_NAME:latest \
            .

      - name: Grype CVE scan (HIGH,CRITICAL)
        continue-on-error: true
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            anchore/grype:latest \
            $IMAGE_NAME:$IMAGE_TAG \
            -o table \
            --only-fixed \
            --by-cve \
            --fail-on high || true

      - name: Build and scans complete
        run: echo "Image build and scans completed. Proceeding to push."

  push-image:
    name: Push Image
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS role secret
        run: |
          if [ -z "${{ env.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "::error::AWS_ROLE_TO_ASSUME is empty."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: gh-frontend-cd
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        working-directory: frontend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $IMAGE_NAME:$IMAGE_TAG \
            -t $IMAGE_NAME:latest \
            -t $REGISTRY/$ECR_REPOSITORY/$IMAGE_NAME:$IMAGE_TAG \
            -t $REGISTRY/$ECR_REPOSITORY/$IMAGE_NAME:latest \
            .

      - name: Push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $REGISTRY/$ECR_REPOSITORY/$IMAGE_NAME:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY/$IMAGE_NAME:latest

  sync-config:
    name: Sync Image Tag to Values
    runs-on: ubuntu-latest
    needs: push-image
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update image tag in values files
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Update values-uat.yaml
          if grep -q "^  tag:" helm/frontend/values-uat.yaml; then
            sed -i "s/^  tag:.*/  tag: \"$IMAGE_TAG\"/" helm/frontend/values-uat.yaml
          else
            cat >> helm/frontend/values-uat.yaml << 'EOF'

image:
  tag: "$IMAGE_TAG"
EOF
          fi

          # Update values-prod.yaml
          if grep -q "^  tag:" helm/frontend/values-prod.yaml; then
            sed -i "s/^  tag:.*/  tag: \"$IMAGE_TAG\"/" helm/frontend/values-prod.yaml
          else
            cat >> helm/frontend/values-prod.yaml << 'EOF'

image:
  tag: "$IMAGE_TAG"
EOF
          fi

      - name: Commit and push updated values
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add helm/frontend/values-uat.yaml helm/frontend/values-prod.yaml
          git diff-index --quiet HEAD || git commit -m "chore: update frontend image tag to ${{ github.sha }}"
          git push
