# AWS Load Balancer Controller values
# https://github.com/aws/eks-charts/blob/master/stable/aws-load-balancer-controller/values.yaml

aws-load-balancer-controller:
  # Cluster name for the ALB/NLB
  clusterName: ""
  
  # Service account settings
  serviceAccount:
    name: aws-load-balancer-controller
    create: true
    annotations:
      eks.amazonaws.com/role-arn: ""
  
  # Replica count
  replicaCount: 2
  
  # Enable ShardByAlb for multiple ALBs
  enableShardByAlb: true
  
  # Enable Shield Advanced
  enableShield: false
  
  # Enable WAF
  enableWaf: false
  
  # Enable WAF v2
  enableWafv2: false
  
  # Default tags to apply to all resources
  defaultTags: {}
  
  # Log level
  logLevel: info
  
  # Resource limits
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  
  # Node selector
  nodeSelector: {}
  
  # Tolerations
  tolerations: []
  
  # Affinity
  affinity: {}
