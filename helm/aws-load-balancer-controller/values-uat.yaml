# AWS Load Balancer Controller - UAT environment values

aws-load-balancer-controller:
  # Cluster name MUST match the EKS cluster name configured in Terraform
  clusterName: k8s-practice-uat
  
  serviceAccount:
    create: true
    name: aws-load-balancer-controller
    # IMPORTANT: Update this with the actual role ARN from Terraform output
    # Run: cd infra/environments/uat && terraform output alb_controller_role_arn
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::715227881960:role/k8s-practice-uat-alb-controller"
  
  replicaCount: 2
  
  # Enable shard by ALB for better multi-ALB support
  enableShardByAlb: true
  
  logLevel: info
  
  # Health check settings
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 15
  
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
