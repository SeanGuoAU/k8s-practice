version: '3.9'

services:
  # Frontend (Next.js)
  frontend:
    container_name: dispatchai-frontend
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

networks:
  dispatchai-network:
    driver: bridge