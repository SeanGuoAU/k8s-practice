version: '3.9'

services:
  frontend:
    container_name: dispatchai-frontend
    build:
      context: .
      dockerfile: Dockerfile
    image: dispatchai-frontend:prod
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - dispatchai-network

networks:
  dispatchai-network:
    driver: bridge